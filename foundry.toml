[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 1_000 }
invariant = { runs = 1_000 }

[profile.ci]
fuzz = { runs = 10_000 }
invariant = { runs = 10_000 }

[rpc_endpoints]
baseSepolia = "https://sepolia.base.org"

[fmt]
line_length = 100
tab_width = 4
